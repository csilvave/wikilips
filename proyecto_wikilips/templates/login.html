{% extends "base.html" %}
{% block title %}Acceso — WikiLips{% endblock %}

{% block extra_head %}
<style>
  .login-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px;
  }
  .login-box {
    width: 100%;
    max-width: 400px;
  }
  .login-box h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    margin-bottom: 8px;
  }
  .login-box p {
    font-size: 13px;
    color: var(--nude-muted);
    margin-bottom: 48px;
  }
  .error-msg {
    font-size: 12px;
    color: #e89099;
    margin-bottom: 24px;
    padding: 12px 0;
    border-bottom: 0.5px solid rgba(180,50,70,0.3);
  }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-box">
    <p class="section-label">Panel de administración</p>
    <h2>Acceso<br><span style="color:var(--rosa); font-style:italic;">restringido</span></h2>
    <p>Ingresa tus credenciales para continuar.</p>

    {% if mensaje %}
    <p class="error-msg">{{ mensaje }}</p>
    {% endif %}

    <form method="POST">
      <div class="field">
        <label>Usuario</label>
        <input type="text" name="usuario" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" name="contrasena" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-primary" style="margin-top:16px">Ingresar</button>
    </form>
  </div>
</div>
{% endblock %}
